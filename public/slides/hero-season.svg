<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none">
  <defs>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#5b21b6"/></linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#db2777"/><stop offset="100%" stop-color="#be185d"/></linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ea580c"/><stop offset="100%" stop-color="#c2410c"/></linearGradient>
    <filter id="s2" x="-8%" y="-8%" width="120%" height="130%"><feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.18"/></filter>
  </defs>
  <!-- 절기 카드들 -->
  <g filter="url(#s2)">
    <rect x="30" y="30" width="200" height="160" rx="12" fill="url(#card1)"/>
    <text x="130" y="80" text-anchor="middle" fill="white" font-size="36">✝️</text>
    <text x="130" y="120" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">부활절</text>
    <text x="130" y="145" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="sans-serif">Easter Sunday</text>
  </g>
  <g filter="url(#s2)">
    <rect x="260" y="50" width="200" height="160" rx="12" fill="url(#card2)"/>
    <text x="360" y="105" text-anchor="middle" fill="white" font-size="36">🎄</text>
    <text x="360" y="145" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">성탄절</text>
    <text x="360" y="170" text-anchor="middle" fill="#fbcfe8" font-size="11" font-family="sans-serif">Christmas</text>
  </g>
  <g filter="url(#s2)">
    <rect x="100" y="220" width="200" height="150" rx="12" fill="url(#card3)"/>
    <text x="200" y="272" text-anchor="middle" fill="white" font-size="36">🌾</text>
    <text x="200" y="312" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">추수감사절</text>
    <text x="200" y="337" text-anchor="middle" fill="#fed7aa" font-size="11" font-family="sans-serif">Thanksgiving</text>
  </g>
  <!-- 데코 -->
  <circle cx="380" cy="300" r="40" fill="#a855f7" opacity="0.1"/>
  <circle cx="450" cy="350" r="25" fill="#ec4899" opacity="0.08"/>
</svg>
